<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<h1>This is a Heading</h1>
<p>This is a paragraph.</p>

  <p>
		<label for="n1">First Number</label>
		<input id="n1" name="n1" type="number">
		<label for="n2">Second Number</label>
		<input id="n2" name="n2" type="number">

		<button onclick="compute()"> Compute Sum </button>
	</p>
 
	<p>
		<label for="sum" id="sumlabel">The sum is:</label>  
		<input id="sum" name="sum" type="number" readonly></input>
	</p>

	<script>
    	function compute()
        {
        var a,b;

        a = document.getElementById("n1").value*1; 
        b = document.getElementById("n2").value*1;  

        console.log(a);
        console.log(b);

        let c  = a + b;

        document.getElementById("sumlabel").innerHTML='The sum of '
        +a+' and '+b+' is:';
        document.getElementById("sum").value=c;

        }
   
	</script>

</body>
</html>
